name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies from lockfile
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
          pip install -e .
      - name: Repository policy checks
        run: python scripts/check_repo_policy.py
      - name: Security audit
        run: |
          pip install pip-audit
          # CVE-2025-3000 is currently reported for transitive torch without a fixed version.
          pip-audit --requirement requirements-lock.txt --no-deps --ignore-vuln CVE-2025-3000
        continue-on-error: true
      - name: Lint
        run: ruff check src tests scripts
      - name: Type check (advisory)
        run: |
          pip install mypy
          mypy src --ignore-missing-imports --no-error-summary || {
            echo "mypy reported type issues; type checking is currently advisory."
          }
      - name: Test with coverage
        run: |
          pip install pytest-cov
          pytest -q --cov=src/rl_framework --cov-report=term-missing --cov-fail-under=60
