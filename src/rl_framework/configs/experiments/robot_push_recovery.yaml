experiment_name: robot_push_recovery
seed: 123

environment:
  type: walker_bullet
  seed: 123
  sim:
    gravity: -9.81
    mass: 3.2
    friction: 0.85
    max_force: 45.0
    body_half_extents: [0.2, 0.1, 0.08]
  reward:
    alive_bonus: 1.2
    forward_velocity_weight: 1.2
    target_velocity: 0.8
    orientation_penalty_weight: 1.8
    torque_penalty_weight: 0.015
  termination:
    min_height: 0.1
    max_tilt_radians: 0.9
    max_steps: 1000
  reset_randomization:
    position_xy_noise: 0.05
    yaw_noise: 0.2
  domain_randomization:
    mass_scale_range: [0.8, 1.2]
    friction_range: [0.7, 1.3]

training:
  policy: MlpPolicy
  total_timesteps: 30000
  learning_rate: 0.0002
  n_steps: 2048
  batch_size: 256
  checkpoint_every: 5000
  normalize_observations: true

evaluation:
  episodes: 8

output:
  base_dir: outputs

sweep:
  parameters:
    environment.domain_randomization.mass_scale_range: [[0.8, 1.2], [0.9, 1.1]]
    environment.reset_randomization.yaw_noise: [0.1, 0.2, 0.3]
