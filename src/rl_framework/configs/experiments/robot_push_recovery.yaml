experiment_name: robot_push_recovery
seed: 123

environment:
  type: walker_bullet
  seed: 123
  sim:
    gravity: -9.81
    mass: 28.0
    friction: 0.85
    max_force: 35.0
    control:
      mode: pd
      position_gain: 0.1
      velocity_gain: 1.0
  reward:
    alive_bonus: 0.25
    forward_velocity_weight: 2.0
    target_velocity: 0.8
    orientation_penalty_weight: 1.8
    torque_penalty_weight: 0.015
  terrain:
    preset: push_recovery
    push_recovery:
      interval_steps: 120
      start_step: 60
      force: 180.0
  termination:
    min_height: 0.18
    max_height: 1.5
    max_steps: 1000
  reset_randomization:
    position_xy_noise: 0.05
    yaw_noise: 0.2
  domain_randomization:
    mass_scale_range: [0.8, 1.2]
    friction_range: [0.7, 1.3]

training:
  policy: MlpPolicy
  total_timesteps: 30000
  learning_rate: 0.0002
  n_steps: 2048
  batch_size: 256
  checkpoint_every: 5000
  normalize_observations: true
  device: cpu

evaluation:
  episodes: 8

output:
  base_dir: outputs

curriculum:
  enabled: true
  level_up_threshold: 80.0
  max_level: 2
  level_params:
    1:
      reward.target_velocity: 1.0
    2:
      reward.target_velocity: 1.2

sweep:
  parameters:
    environment.domain_randomization.mass_scale_range: [[0.8, 1.2], [0.9, 1.1]]
    environment.reset_randomization.yaw_noise: [0.1, 0.2, 0.3]
