experiment_name: organisms_fight_arena
seed: 11

environment:
  type: organism_arena_parallel
  seed: 11
  sim:
    arena_half_extent: 1.2
    move_speed: 0.05
    spawn_jitter: 0.1
  morphology:
    base_size: 1.0
    episode_growth_scale: 0.0
    health: 1.2
  battle_rules:
    damage: 0.06
    attack_range: 0.2
    cooldown_steps: 3
    max_steps: 400
    win_health_threshold: 0.0

training:
  policy: MlpPolicy
  total_timesteps: 30000
  learning_rate: 0.0003
  n_steps: 1024
  batch_size: 256
  checkpoint_every: 5000
  normalize_observations: true
  device: cpu
  # Self-play arena now runs on SB3's native vec-env path, so num_envs > 1
  # parallelizes rollout across cores (env_method-driven annealing/curriculum
  # still propagate). Bump toward the core count (24 here) for faster training.
  num_envs: 8

evaluation:
  episodes: 5

# League self-play: agent_0 trains against frozen past-self snapshots (agent_1).
self_play:
  enabled: true
  snapshot_freq: 5000
  max_league_size: 10
  sampling_mode: uniform

# Dense-to-sparse: ramp the per-hit reward to zero over the first half of
# training so the terminal win/loss signal eventually dominates.
reward_annealing:
  enabled: true
  anneal_steps: 15000

# Win-rate-gated curriculum: ramp combat tempo as agent_0's win rate climbs.
# Metric is logged by ArenaMetricsCallback; thresholds are win-rate fractions.
# warmup_steps holds level-ups until the league has real opponents (>= the
# self_play.snapshot_freq above); before that the opponent is random actions
# and the win rate would advance the curriculum against noise.
# Difficulty ramps monotonically up from the base (damage 0.06, cooldown 3):
# higher damage + shorter cooldown = faster, deadlier combat at each level.
curriculum:
  enabled: true
  metric: arena/agent_0_win_rate
  warmup_steps: 5000
  max_level: 3
  level_up_thresholds:
    0: 0.60
    1: 0.65
    2: 0.70
  level_params:
    1:
      battle_rules.cooldown_steps: 3
      battle_rules.damage: 0.08
    2:
      battle_rules.cooldown_steps: 2
      battle_rules.damage: 0.10
    3:
      battle_rules.cooldown_steps: 2
      battle_rules.damage: 0.12

output:
  base_dir: outputs

sweep:
  parameters:
    environment.battle_rules.attack_range: [0.15, 0.2, 0.25]
    environment.battle_rules.cooldown_steps: [2, 3, 4]
