experiment_name: walker_ppo_baseline
seed: 0

environment:
  type: walker_bullet
  seed: 0
  observation: {version: v2, coordinate_free: true}
  terrain: {preset: flat}
  reward:
    alive_bonus: 0.25
    forward_velocity_weight: 2.0
    target_velocity: 1.0
    velocity_sigma: 0.5
    orientation_penalty_weight: 0.3
    torque_penalty_weight: 0.01
    fall_penalty: 10.0
  termination:
    min_height: 0.18
    max_height: 1.5
    max_steps: 800
  reset_randomization:
    position_xy_noise: 0.02
    yaw_noise: 0.08
  domain_randomization:
    mass_scale_range: [0.95, 1.05]
    friction_range: [0.9, 1.1]

training:
  algorithm: PPO
  policy: MlpPolicy
  total_timesteps: 500000
  num_envs: 1
  n_steps: 1024
  batch_size: 256
  n_epochs: 10
  learning_rate: 0.0003
  checkpoint_every: 50000
  normalize_observations: true
  device: cpu

evaluation:
  episodes: 20

output: {base_dir: outputs}
