experiment_name: my_walker
seed: 42
environment:
  type: walker_bullet
  seed: 42
  domain_randomization:
    action_latency_steps: 0
    friction_range:
    - 0.9
    - 1.1
    mass_scale_range:
    - 0.95
    - 1.05
    sensor_noise_std: 0
  reset_randomization:
    position_xy_noise: 0.02
    yaw_noise: 0.08
  reward:
    alive_bonus: 5
    fall_penalty: 10
    forward_velocity_weight: 1.5
    orientation_penalty_weight: 0.3
    target_velocity: 1
    torque_penalty_weight: 0.01
    velocity_sigma: 0.5
  sim:
    body_half_extents:
    - 0.2
    - 0.1
    - 0.08
    control:
      mode: pd
      position_gain: 0.1
      velocity_gain: 1
    frame_skip: 4
    friction: 0.9
    gravity: -9.81
    mass: 3
    max_force: 35
    settle_steps: 30
    timestep: 0.004166666666666667
  termination:
    max_steps: 800
    min_height: 0.18
training:
  batch_size: 512
  checkpoint_every: 50000
  clip_range: 0.2
  device: auto
  ent_coef: 0.005
  gae_lambda: 0.95
  gamma: 0.99
  learning_rate: 0.0003
  learning_rate_end: 5.0e-05
  max_grad_norm: 0.5
  n_epochs: 10
  n_steps: 2048
  normalize_observations: true
  num_envs: 8
  policy: MlpPolicy
  total_timesteps: 2000000
  vf_coef: 0.5
evaluation:
  episodes: 5
output:
  base_dir: outputs
