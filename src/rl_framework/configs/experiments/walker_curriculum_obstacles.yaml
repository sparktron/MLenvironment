experiment_name: walker_curriculum_obstacles
seed: 42
environment:
  type: walker_bullet
  seed: 42
  terrain:
    preset: obstacles
    obstacle_height: 0.10
  reward:
    alive_bonus: 0.25
    forward_velocity_weight: 2.0
    target_velocity: 0.5
    torque_penalty_weight: 0.01
  termination:
    min_height: 0.18
    max_height: 1.5
    max_steps: 800
training:
  policy: MlpPolicy
  total_timesteps: 1500000
  num_envs: 24
  n_steps: 2048
  batch_size: 512
  learning_rate: 0.0003
  checkpoint_every: 50000
  normalize_observations: true
  device: cpu
output:
  base_dir: outputs
curriculum:
  enabled: true
  level_up_threshold: 100.0
  max_level: 2
  level_params:
    1:
      reward.target_velocity: 0.7
    2:
      reward.target_velocity: 0.9
