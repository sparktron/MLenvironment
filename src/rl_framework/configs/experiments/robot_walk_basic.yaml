experiment_name: robot_walk_basic
seed: 42

environment:
  type: walker_bullet
  seed: 42
  sim:
    gravity: -9.81
    mass: 28.0
    friction: 0.9
    max_force: 35.0
    timestep: 0.004166667
    frame_skip: 4
    settle_steps: 30
    control:
      mode: pd
      position_gain: 0.1
      velocity_gain: 1.0
  reward:
    alive_bonus: 5.0
    forward_velocity_weight: 1.5
    target_velocity: 1.0
    velocity_sigma: 0.5
    orientation_penalty_weight: 0.3
    torque_penalty_weight: 0.01
    fall_penalty: 10.0
  termination:
    min_height: 0.18
    max_height: 1.5
    max_steps: 800
  reset_randomization:
    position_xy_noise: 0.02
    yaw_noise: 0.08
  domain_randomization:
    mass_scale_range: [0.95, 1.05]
    friction_range: [0.9, 1.1]

training:
  policy: MlpPolicy
  total_timesteps: 2000000
  num_envs: 24
  n_steps: 2048
  batch_size: 512
  n_epochs: 10
  learning_rate: 0.0003
  learning_rate_end: 0.00005
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.005
  vf_coef: 0.5
  max_grad_norm: 0.5
  checkpoint_every: 50000
  normalize_observations: true
  device: cpu

evaluation:
  episodes: 5

output:
  base_dir: outputs

sweep:
  parameters:
    environment.reward.target_velocity: [0.5, 1.0, 1.5]
    environment.reward.torque_penalty_weight: [0.005, 0.01]
